name: Bouw Android App Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/android-build.yml"

permissions:
  contents: read

jobs:
  build-aab:
    name: Bouw unsigned AAB
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Haal broncode op
        uses: actions/checkout@v4

      - name: Stel Java 17 in
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Controleer Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Stel Android SDK in
        uses: android-actions/setup-android@v3

      - name: Installeer Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Stel Gradle in
        uses: gradle/actions/setup-gradle@v4

      - name: Bouw releasebundel
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Bewaar unsigned bundel
        uses: actions/upload-artifact@v4
        with:
          name: de-wijnkast-unsigned-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 7
